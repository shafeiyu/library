# Hugo configuration file
title: Sha的书架

capitalizeListTitles: false
pluralizeListTitles: true
enableRobotsTXT: true
# Parse Git commit
enableGitInfo: true
enableEmoji: true
hasCJKLanguage: true

outputs:
  home: [html, llms]
  page: [html, markdown]
  section: [html, rss, markdown]

defaultContentLanguage: 简体中文

# import hextra as module
module:
  imports:
    - path: github.com/imfing/hextra

markup:
  highlight:
    noClasses: false
  goldmark:
    renderer:
      unsafe: true
    extensions:
      passthrough:
        delimiters:
          block: [['\[', '\]'], ['$$', '$$']]
          # inline: [['\(', '\)']]
          inline: [['$', '$']]
        enable: true

enableInlineShortcodes: true

menu:
  main:
    - name: 书架
      pageRef: /book
      weight: 1
    - name: 随笔
      pageRef: /ink
      weight: 2
    - name: 关于
      pageRef: /about
      weight: 3
    - name: 搜索
      weight: 4
      params:
        type: search
    - name: GitHub
      weight: 5
      url: "https://github.com/shafeiyu/library"
      params:
        icon: github

  sidebar:
    - identifier: more
      name: More
      params:
        type: separator
      weight: 1
    - identifier: about
      name: "About"
      pageRef: "/about"
      weight: 2
    - identifier: discussions
      name: "Github Discussions ↗"
      url: "https://github.com/Aerosand/aerosand.github.io/discussions"
      weight: 3

params:
  navbar:
    displayTitle: true
    displayLogo: false

  footer:
    displayCopyright: false
    displayPoweredBy: true

  editURL:
    enable: true
    base: "https://github.com/imfing/hextra-starter-template/edit/main/content"