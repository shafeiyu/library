# Hugo configuration file
title: Sha的书架

capitalizeListTitles: false
pluralizeListTitles: true
enableRobotsTXT: true
# Parse Git commit
enableGitInfo: true
enableEmoji: true
hasCJKLanguage: true

outputs:
  home: [html, llms]
  page: [html, markdown]
  section: [html, rss, markdown]

defaultContentLanguage: 简体中文

# import hextra as module
module:
  imports:
    - path: github.com/imfing/hextra

markup:
  highlight:
    noClasses: false
  goldmark:
    renderer:
      unsafe: true
    extensions:
      passthrough:
        delimiters:
          block: [['\[', '\]'], ['$$', '$$']]
          # inline: [['\(', '\)']]
          inline: [['$', '$']]
        enable: true

enableInlineShortcodes: true

menu:
  main:
    - name: 书架
      pageRef: /book
      weight: 1
    - name: 随笔
      pageRef: /ink
      weight: 2
    - name: 关于
      pageRef: /about
      weight: 3
    - name: 搜索
      weight: 4
      params:
        type: search
    - name: GitHub
      weight: 5
      url: "https://github.com/shafeiyu/library"
      params:
        icon: github

  sidebar:
    - identifier: more
      name: 更多
      params:
        type: separator
      weight: 1
    - identifier: about
      name: 关于
      pageRef: /about
      weight: 2
    - identifier: discussions
      name: "Github Discussions ↗"
      url: "https://github.com/Aerosand/aerosand.github.io/discussions"
      weight: 3

params:
  navbar:
    displayTitle: true
    displayLogo: true
    logo:
      path: /logo.png
      dark: /logo.png
      width: 20
      height: 20
      link: /
    width: wide

  footer:
    enable: true
    displayCopyright: true
    displayPoweredBy: false
    width: normal

  editURL:
    enable: true
    base: "https://github.com/shafeiyu/library/edit/main/content"

  description: Sha的书架
  externalLinkDecoration: true


  theme:
    # light | dark | system
    default: system
    displayToggle: true

  # Display the last modification info
  displayUpdatedDate: true
  dateFormat: "January 2, 2006"
  displayUpdatedAuthor: true

  # Search
  # flexsearch is enabled by default
  search:
    enable: true
    type: flexsearch

    flexsearch:
      # index page by: content | summary | heading | title
      index: content
      # full | forward | reverse | strict
      # https://github.com/nextapps-de/flexsearch/#tokenizer-prefix-search
      tokenize: reverse

  blog:
    list:
      displayTags: true
      # date | lastmod | publishDate | title | weight
      sortBy: date
      sortOrder: desc # or "asc"
      # Pagination
      pagerSize: 20

    article:
      displayPagination: true

  toc:
    displayTags: true

  highlight:
    copy:
      enable: true
      # hover | always
      display: hover

  page:
    # full (100%), wide (90rem), normal (80rem)
    width: normal
    contextMenu:
      enable: true
      links:
        - name: "Ask DeepSeek"
          url: "https://chat.deepseek.com"
          icon: "chat"
    # tabs:
    #   sync: true

  comments:
    enable: false
    type: giscus

    # https://giscus.app/
    giscus:
      repo: shafeiyu/library
      repoId: R_kgDOSS-gng
      category: Announcements
      categoryId: DIC_kwDOSS-gns4C8POT
      mapping: title
      strict: 0
      reactionsEnabled: 1
      emitMetadata: 1
      inputPosition: top
      lang: zh-CN
      loading: lazy
      theme: noborder_light

  imageZoom:
    enable: true


  archives:
    section: docs
    dateFormat: "Jan 02"