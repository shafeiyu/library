# Hugo configuration file
title: Sha的书架

# import hextra as module
module:
  imports:
    - path: github.com/imfing/hextra

defaultContentLanguage: zh-CN

markup:
  # allow raw html
  goldmark:
    renderer:
      unsafe: true

  # enable hextra syntax highlight
  highlight:
    noClasses: false

menu:
  main:
    - name: 书架
      pageRef: /book
      weight: 1
    - name: 随笔
      pageRef: /ink
      weight: 2
    - name: 关于
      pageRef: /about
      weight: 3
    - name: 搜索
      weight: 4
      params:
        type: search
    - name: GitHub
      weight: 5
      url: "https://github.com/shafeiyu/library"
      params:
        icon: github

